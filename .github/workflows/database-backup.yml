name: Database Backup (Docker)

# Ejecuta automáticamente cada día a las 3:00 AM UTC (10:00 PM hora Colombia)
# También se puede ejecutar manualmente desde GitHub Actions
on:
  schedule:
    - cron: '0 3 * * *'  # Diariamente a las 3:00 AM UTC
  workflow_dispatch:  # Permite ejecución manual

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backup directory
        run: |
          mkdir -p backups
          echo "✅ Backup directory created"

      - name: Pull PostgreSQL 17 Docker image
        run: |
          echo "🐳 Pulling PostgreSQL 17 Docker image..."
          docker pull postgres:17
          echo "✅ Image pulled successfully"

      - name: Verify PostgreSQL version in Docker
        run: |
          echo "🔍 PostgreSQL version in Docker container:"
          docker run --rm postgres:17 pg_dump --version

      - name: Create database backup using Docker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Verificar que DATABASE_URL esté configurada
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL no está configurada"
            exit 1
          fi

          echo "✅ DATABASE_URL está configurada"
          echo "🔍 Conectando a: $(echo $DATABASE_URL | sed 's/postgresql:\/\/.*@/postgresql:\/\/***@/')"

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          BACKUP_FILE="backup_$TIMESTAMP.sql"

          echo "📦 Creating backup with Docker PostgreSQL 17..."

          # Usar Docker para ejecutar pg_dump con PostgreSQL 17
          docker run --rm \
            -e PGPASSWORD="" \
            postgres:17 \
            pg_dump "$DATABASE_URL" > "backups/$BACKUP_FILE"

          # Verificar que el archivo se creó
          if [ ! -f "backups/$BACKUP_FILE" ]; then
            echo "❌ Error: El archivo de backup no se creó"
            exit 1
          fi

          BACKUP_SIZE=$(du -h "backups/$BACKUP_FILE" | cut -f1)
          echo "✅ Backup creado: $BACKUP_SIZE"

          echo "🗜️ Compressing backup..."
          gzip "backups/$BACKUP_FILE"

          if [ -f "backups/$BACKUP_FILE.gz" ]; then
            COMPRESSED_SIZE=$(du -h "backups/$BACKUP_FILE.gz" | cut -f1)
            echo "✅ Backup comprimido: $COMPRESSED_SIZE"
            ls -lh backups/*.sql.gz
          else
            echo "❌ Error: El archivo comprimido no se creó"
            exit 1
          fi

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: backups/*.sql.gz
          retention-days: 30  # Mantener por 30 días (gratis en GitHub)

      - name: Clean old backups (keep last 7 locally)
        run: |
          cd backups
          ls -t backup_*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm || true
