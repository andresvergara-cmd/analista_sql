name: Database Backup (Docker)

# Ejecuta automáticamente cada día a las 3:00 AM UTC (10:00 PM hora Colombia)
# También se puede ejecutar manualmente desde GitHub Actions
on:
  schedule:
    - cron: '0 3 * * *'  # Diariamente a las 3:00 AM UTC
  workflow_dispatch:  # Permite ejecución manual

jobs:
  backup:
    runs-on: ubuntu-latest

    # Usar container de PostgreSQL 17 directamente
    container:
      image: postgres:17

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify PostgreSQL version
        run: |
          echo "🔍 PostgreSQL version:"
          pg_dump --version
          psql --version

      - name: Create backup directory
        run: |
          mkdir -p backups
          echo "✅ Backup directory created"
          ls -la

      - name: Test database connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Testing database connection..."
          if psql "$DATABASE_URL" -c "SELECT version();" 2>&1; then
            echo "✅ Database connection successful"
          else
            echo "❌ Cannot connect to database"
            echo "Please verify DATABASE_URL secret is correct"
            exit 1
          fi

      - name: Create database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Verificar que DATABASE_URL esté configurada
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL no está configurada"
            echo "Por favor configura el secret DATABASE_URL en GitHub"
            exit 1
          fi

          echo "✅ DATABASE_URL está configurada"
          echo "🔍 Conectando a: $(echo $DATABASE_URL | sed 's/postgresql:\/\/.*@/postgresql:\/\/***@/')"

          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          BACKUP_FILE="backups/backup_$TIMESTAMP.sql"

          echo "📦 Creating backup: $BACKUP_FILE"

          # Ejecutar pg_dump con mejor manejo de errores
          if pg_dump --no-sync "$DATABASE_URL" > "$BACKUP_FILE" 2>&1; then
            echo "✅ pg_dump completado exitosamente"
          else
            echo "❌ Error ejecutando pg_dump"
            exit 1
          fi

          # Verificar que el archivo se creó
          if [ ! -f "$BACKUP_FILE" ]; then
            echo "❌ Error: El archivo de backup no se creó"
            exit 1
          fi

          BACKUP_SIZE=$(du -h "$BACKUP_FILE" | cut -f1)
          echo "✅ Backup creado: $BACKUP_SIZE"

          echo "🗜️ Compressing backup..."
          gzip "$BACKUP_FILE"

          if [ -f "$BACKUP_FILE.gz" ]; then
            COMPRESSED_SIZE=$(du -h "$BACKUP_FILE.gz" | cut -f1)
            echo "✅ Backup comprimido: $COMPRESSED_SIZE"
            ls -lh backups/*.sql.gz
          else
            echo "❌ Error: El archivo comprimido no se creó"
            exit 1
          fi

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: backups/*.sql.gz
          retention-days: 30  # Mantener por 30 días (gratis en GitHub)

      - name: Clean old backups (keep last 7 locally)
        run: |
          cd backups
          ls -t backup_*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm || true
